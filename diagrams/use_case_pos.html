<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ Use Case - Hệ thống Bán Hàng (HBH)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle { font-size: 0.95rem; color: #888; margin-bottom: 30px; }
        .diagram-container {
            background: #16162a;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            overflow: auto;
        }
        svg text { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <h1>Biểu đồ Use Case — Hệ thống Bán Hàng (HBH)</h1>
    <p class="subtitle">Bài tập 2 — Point Of Sale Terminal (POST) System</p>

    <div class="diagram-container">
        <svg width="1200" height="850" viewBox="0 0 1200 850" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="sysGrad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#1e1e3a"/>
                    <stop offset="100%" stop-color="#12122a"/>
                </linearGradient>
                <linearGradient id="ucGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#3b3b6d"/>
                    <stop offset="100%" stop-color="#25254a"/>
                </linearGradient>
                <linearGradient id="ucGradExt" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#2d4a3d"/>
                    <stop offset="100%" stop-color="#1a3a2a"/>
                </linearGradient>
                <linearGradient id="ucGradInc" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#4a3b2d"/>
                    <stop offset="100%" stop-color="#3a2a1a"/>
                </linearGradient>
                <linearGradient id="ucGradGen" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#3d2d4a"/>
                    <stop offset="100%" stop-color="#2a1a3a"/>
                </linearGradient>
                <!-- Arrowheads -->
                <marker id="arrowInclude" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
                </marker>
                <marker id="arrowExtend" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
                </marker>
                <!-- Generalization arrowhead (hollow triangle) -->
                <marker id="arrowGen" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto">
                    <polygon points="0 0, 14 5, 0 10" fill="#16162a" stroke="#c084fc" stroke-width="1.5"/>
                </marker>
            </defs>

            <!-- ==================== SYSTEM BOUNDARY ==================== -->
            <rect x="250" y="20" width="700" height="790" rx="18" ry="18"
                  fill="url(#sysGrad)" stroke="#4a4a8a" stroke-width="2" stroke-dasharray="8,4"/>
            <text x="600" y="55" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="700">
                Hệ thống Bán Hàng — HBH (POST System)
            </text>

            <!-- ================================================================ -->
            <!--                          USE CASES                               -->
            <!-- ================================================================ -->

            <!-- ===== THU NGÂN AREA (top-left of system) ===== -->

            <!-- UC: Bán hàng (Process Sale) — main UC -->
            <ellipse cx="480" cy="150" rx="115" ry="34" fill="url(#ucGrad)" stroke="#6366f1" stroke-width="2"/>
            <text x="480" y="155" text-anchor="middle" fill="#e0e0ff" font-size="14" font-weight="600">Bán hàng</text>

            <!-- UC: Thanh toán (Process Payment) — main UC -->
            <ellipse cx="480" cy="310" rx="115" ry="34" fill="url(#ucGrad)" stroke="#6366f1" stroke-width="2"/>
            <text x="480" y="315" text-anchor="middle" fill="#e0e0ff" font-size="14" font-weight="600">Thanh toán</text>

            <!-- UC: Quét mã vạch — <<include>> from Bán hàng -->
            <ellipse cx="750" cy="120" rx="120" ry="30" fill="url(#ucGradInc)" stroke="#fbbf24" stroke-width="1.5"/>
            <text x="750" y="125" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="500">Quét mã vạch</text>

            <!-- UC: Tính tiền — <<include>> from Bán hàng -->
            <ellipse cx="750" cy="200" rx="110" ry="30" fill="url(#ucGradInc)" stroke="#fbbf24" stroke-width="1.5"/>
            <text x="750" y="205" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="500">Tính tiền</text>

            <!-- ===== PAYMENT SPECIALIZATIONS ===== -->

            <!-- UC: Thanh toán tiền mặt (Cash) -->
            <ellipse cx="340" cy="470" rx="120" ry="30" fill="url(#ucGradGen)" stroke="#c084fc" stroke-width="1.5"/>
            <text x="340" y="467" text-anchor="middle" fill="#e0b0ff" font-size="12" font-weight="500">Thanh toán</text>
            <text x="340" y="482" text-anchor="middle" fill="#e0b0ff" font-size="12" font-weight="500">tiền mặt</text>

            <!-- UC: Thanh toán thẻ tín dụng (Credit Card) -->
            <ellipse cx="550" cy="470" rx="120" ry="30" fill="url(#ucGradGen)" stroke="#c084fc" stroke-width="1.5"/>
            <text x="550" y="467" text-anchor="middle" fill="#e0b0ff" font-size="12" font-weight="500">Thanh toán</text>
            <text x="550" y="482" text-anchor="middle" fill="#e0b0ff" font-size="12" font-weight="500">thẻ tín dụng</text>

            <!-- UC: Thanh toán séc (Check) -->
            <ellipse cx="760" cy="470" rx="110" ry="30" fill="url(#ucGradGen)" stroke="#c084fc" stroke-width="1.5"/>
            <text x="760" y="467" text-anchor="middle" fill="#e0b0ff" font-size="12" font-weight="500">Thanh toán</text>
            <text x="760" y="482" text-anchor="middle" fill="#e0b0ff" font-size="12" font-weight="500">séc (Check)</text>

            <!-- ===== GIÁM ĐỐC AREA (bottom) ===== -->

            <!-- UC: Xem báo cáo bán hàng -->
            <ellipse cx="430" cy="620" rx="135" ry="32" fill="url(#ucGrad)" stroke="#6366f1" stroke-width="1.5"/>
            <text x="430" y="625" text-anchor="middle" fill="#e0e0ff" font-size="13" font-weight="500">Xem báo cáo bán hàng</text>

            <!-- UC: Kiểm kê tồn kho -->
            <ellipse cx="430" cy="710" rx="125" ry="32" fill="url(#ucGrad)" stroke="#6366f1" stroke-width="1.5"/>
            <text x="430" y="715" text-anchor="middle" fill="#e0e0ff" font-size="13" font-weight="500">Kiểm kê tồn kho</text>

            <!-- UC: Theo dõi hàng bán chạy -->
            <ellipse cx="700" cy="665" rx="145" ry="32" fill="url(#ucGrad)" stroke="#6366f1" stroke-width="1.5"/>
            <text x="700" y="670" text-anchor="middle" fill="#e0e0ff" font-size="13" font-weight="500">Theo dõi hàng bán chạy</text>

            <!-- ================================================================ -->
            <!--         ACTOR: THU NGÂN (LEFT-TOP)                               -->
            <!-- ================================================================ -->
            <g transform="translate(110, 220)">
                <circle cx="0" cy="-30" r="16" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
                <line x1="0" y1="-14" x2="0" y2="20" stroke="#a78bfa" stroke-width="2.5"/>
                <line x1="-20" y1="0" x2="20" y2="0" stroke="#a78bfa" stroke-width="2.5"/>
                <line x1="0" y1="20" x2="-15" y2="45" stroke="#a78bfa" stroke-width="2.5"/>
                <line x1="0" y1="20" x2="15" y2="45" stroke="#a78bfa" stroke-width="2.5"/>
                <text x="0" y="65" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="600">Thu ngân</text>
                <text x="0" y="82" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="400">(Nhân viên bán hàng)</text>
            </g>

            <!-- ================================================================ -->
            <!--         ACTOR: GIÁM ĐỐC (LEFT-BOTTOM)                           -->
            <!-- ================================================================ -->
            <g transform="translate(110, 670)">
                <circle cx="0" cy="-30" r="16" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
                <line x1="0" y1="-14" x2="0" y2="20" stroke="#f59e0b" stroke-width="2.5"/>
                <line x1="-20" y1="0" x2="20" y2="0" stroke="#f59e0b" stroke-width="2.5"/>
                <line x1="0" y1="20" x2="-15" y2="45" stroke="#f59e0b" stroke-width="2.5"/>
                <line x1="0" y1="20" x2="15" y2="45" stroke="#f59e0b" stroke-width="2.5"/>
                <text x="0" y="65" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="600">Giám đốc</text>
            </g>

            <!-- ================================================================ -->
            <!--         ACTOR: HỆ THỐNG NGÂN HÀNG (RIGHT)                       -->
            <!-- ================================================================ -->
            <g transform="translate(1090, 440)">
                <circle cx="0" cy="-30" r="16" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
                <line x1="0" y1="-14" x2="0" y2="20" stroke="#60a5fa" stroke-width="2.5"/>
                <line x1="-20" y1="0" x2="20" y2="0" stroke="#60a5fa" stroke-width="2.5"/>
                <line x1="0" y1="20" x2="-15" y2="45" stroke="#60a5fa" stroke-width="2.5"/>
                <line x1="0" y1="20" x2="15" y2="45" stroke="#60a5fa" stroke-width="2.5"/>
                <text x="0" y="65" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">Hệ thống</text>
                <text x="0" y="82" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">Ngân hàng</text>
            </g>

            <!-- ================================================================ -->
            <!--  ASSOCIATIONS: Thu ngân (solid lines)                            -->
            <!-- ================================================================ -->
            <!-- Thu ngân → Bán hàng -->
            <line x1="130" y1="200" x2="365" y2="155" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
            <!-- Thu ngân → Thanh toán -->
            <line x1="130" y1="225" x2="365" y2="310" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>

            <!-- ================================================================ -->
            <!--  ASSOCIATIONS: Giám đốc (solid lines)                           -->
            <!-- ================================================================ -->
            <!-- Giám đốc → Xem báo cáo -->
            <line x1="130" y1="655" x2="295" y2="625" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
            <!-- Giám đốc → Kiểm kê tồn kho -->
            <line x1="130" y1="670" x2="305" y2="710" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
            <!-- Giám đốc → Theo dõi hàng bán chạy -->
            <line x1="130" y1="665" x2="555" y2="665" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>

            <!-- ================================================================ -->
            <!--  ASSOCIATIONS: Hệ thống Ngân hàng (solid lines)                 -->
            <!-- ================================================================ -->
            <!-- NH → Thanh toán thẻ tín dụng -->
            <line x1="1070" y1="430" x2="670" y2="470" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
            <!-- NH → Thanh toán séc -->
            <line x1="1070" y1="445" x2="870" y2="470" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>

            <!-- ================================================================ -->
            <!--  <<include>> : Bán hàng → Quét mã vạch, Tính tiền               -->
            <!-- ================================================================ -->
            <!-- Bán hàng → Quét mã vạch -->
            <line x1="595" y1="140" x2="630" y2="125"
                  stroke="#fbbf24" stroke-width="1.4" stroke-dasharray="7,4" opacity="0.8"
                  marker-end="url(#arrowInclude)"/>
            <!-- <<include>> label -->
            <rect x="575" y="108" width="78" height="16" rx="3" fill="#1e1e3a" stroke="none"/>
            <text x="614" y="120" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">&lt;&lt;include&gt;&gt;</text>

            <!-- Bán hàng → Tính tiền -->
            <line x1="595" y1="160" x2="640" y2="195"
                  stroke="#fbbf24" stroke-width="1.4" stroke-dasharray="7,4" opacity="0.8"
                  marker-end="url(#arrowInclude)"/>
            <!-- <<include>> label -->
            <rect x="588" y="170" width="78" height="16" rx="3" fill="#1e1e3a" stroke="none"/>
            <text x="627" y="182" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">&lt;&lt;include&gt;&gt;</text>

            <!-- ================================================================ -->
            <!--  <<include>> : Bán hàng → Thanh toán                             -->
            <!-- ================================================================ -->
            <line x1="480" y1="184" x2="480" y2="276"
                  stroke="#fbbf24" stroke-width="1.4" stroke-dasharray="7,4" opacity="0.8"
                  marker-end="url(#arrowInclude)"/>
            <rect x="485" y="225" width="78" height="16" rx="3" fill="#1e1e3a" stroke="none"/>
            <text x="524" y="237" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">&lt;&lt;include&gt;&gt;</text>

            <!-- ================================================================ -->
            <!--  GENERALIZATION: Payment specializations → Thanh toán            -->
            <!--  (solid line with hollow triangle arrowhead pointing to parent)  -->
            <!-- ================================================================ -->

            <!-- Thanh toán tiền mặt → Thanh toán -->
            <line x1="370" y1="440" x2="440" y2="344"
                  stroke="#c084fc" stroke-width="1.5" opacity="0.8"
                  marker-end="url(#arrowGen)"/>

            <!-- Thanh toán thẻ tín dụng → Thanh toán -->
            <line x1="530" y1="440" x2="490" y2="344"
                  stroke="#c084fc" stroke-width="1.5" opacity="0.8"
                  marker-end="url(#arrowGen)"/>

            <!-- Thanh toán séc → Thanh toán -->
            <line x1="720" y1="442" x2="560" y2="335"
                  stroke="#c084fc" stroke-width="1.5" opacity="0.8"
                  marker-end="url(#arrowGen)"/>

            <!-- Generalization label -->
            <rect x="560" y="385" width="115" height="18" rx="4" fill="#1e1e3a" stroke="none"/>
            <text x="617" y="398" text-anchor="middle" fill="#c084fc" font-size="10" font-weight="600">Generalization</text>

            <!-- ================================================================ -->
            <!--                         LEGEND                                   -->
            <!-- ================================================================ -->
            <g transform="translate(270, 823)">
                <line x1="0" y1="8" x2="30" y2="8" stroke="#8888cc" stroke-width="1.5"/>
                <text x="35" y="13" fill="#aaa" font-size="11">Association</text>

                <line x1="145" y1="8" x2="175" y2="8" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4"/>
                <polygon points="175,5 183,8 175,11" fill="#fbbf24"/>
                <text x="188" y="13" fill="#aaa" font-size="11">&lt;&lt;include&gt;&gt;</text>

                <line x1="310" y1="8" x2="340" y2="8" stroke="#c084fc" stroke-width="1.5"/>
                <polygon points="340,3 352,8 340,13" fill="#16162a" stroke="#c084fc" stroke-width="1"/>
                <text x="358" y="13" fill="#aaa" font-size="11">Generalization</text>

                <line x1="500" y1="8" x2="530" y2="8" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,4"/>
                <polygon points="530,5 538,8 530,11" fill="#34d399"/>
                <text x="543" y="13" fill="#aaa" font-size="11">&lt;&lt;extend&gt;&gt;</text>
            </g>
        </svg>
    </div>
</body>
</html>
